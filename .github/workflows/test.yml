name: tests

# Runs pytest on every push to any branch and on every PR. Distinct from
# release.yml, which is workflow_dispatch-driven and produces the .exe / zip.
#
# fetch-depth: 0 is required here (unlike sibling plugins) because the test
# suite exercises real `git worktree` operations against the checked-out repo
# and needs full history / refs to do so.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install plugin + test deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pytest
        shell: pwsh
        run: python -m pytest
